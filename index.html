<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F4F5F8;
  --surface: #ffffff;
  --ink: #111D40;
  --ink2: #3A4A6B;
  --ink3: #8A96B0;
  --accent: #E8521A;
  --accent-soft: rgba(232,82,26,0.09);
  --border: rgba(27,43,94,0.12);
  --border2: rgba(27,43,94,0.06);
  --agent-bg: #111D40;
  --agent-text: #EEF0F7;
  --user-bg: #ffffff;
  --shadow: 0 2px 20px rgba(27,43,94,0.08);
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: none;
  background: var(--ink);
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-family: 'Noto Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink2);
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-label {
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.08em;
  font-family: 'Noto Sans', sans-serif;
}

.progress-dots {
  display: flex;
  gap: 5px;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.4s, transform 0.3s;
}

.dot.active {
  background: var(--accent);
  transform: scale(1.3);
}

.dot.done {
  background: var(--accent);
  opacity: 0.4;
}

/* Main chat area */
.chat-area {
  flex: 1;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  padding: 40px 24px 160px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* Messages */
.message {
  display: flex;
  flex-direction: column;
  margin-bottom: 32px;
  animation: msgIn 0.35s ease both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.agent { align-items: flex-start; }
.message.user  { align-items: flex-end; }

.msg-label {
  font-family: 'Noto Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.message.agent .msg-label { color: var(--accent); }
.message.user  .msg-label { color: var(--ink3); }

.bubble {
  max-width: 88%;
  padding: 18px 22px;
  line-height: 1.75;
  font-size: 15px;
}

.message.agent .bubble {
  background: var(--agent-bg);
  color: var(--agent-text);
  border-radius: 2px 14px 14px 14px;
  font-family: 'Noto Sans', sans-serif;
  font-size: 15.5px;
  font-weight: 400;
}

.message.agent .bubble strong {
  font-weight: 600;
  color: #f0ece5;
}

.message.agent .bubble em {
  font-style: italic;
  color: rgba(240,236,229,0.75);
}

.message.user .bubble {
  background: var(--surface);
  color: var(--ink);
  border-radius: 14px 14px 2px 14px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  font-weight: 300;
}

/* Typing indicator */
.typing {
  display: flex;
  gap: 5px;
  padding: 14px 20px;
  background: var(--agent-bg);
  border-radius: 2px 14px 14px 14px;
  width: fit-content;
}

.typing span {
  width: 6px;
  height: 6px;
  background: rgba(240,236,229,0.5);
  border-radius: 50%;
  animation: bounce 1.2s ease infinite;
}

.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* Summary card */
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 0 10px 10px 0;
  padding: 24px 28px;
  margin-top: 8px;
  font-size: 14px;
  line-height: 1.8;
  color: var(--ink);
  max-width: 88%;
}

.summary-card h3 {
  font-family: 'Noto Sans', sans-serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 12px;
}

.summary-card .section {
  margin-bottom: 14px;
}

.summary-card .section-label {
  font-family: 'Noto Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 4px;
}

.summary-card .section-value {
  color: var(--ink);
  font-weight: 400;
}

/* Input area */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, var(--bg) 70%, transparent);
  padding: 16px 24px 28px;
  display: flex;
  justify-content: center;
}

.input-wrap {
  max-width: 720px;
  width: 100%;
  display: flex;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 10px 10px 10px 18px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-wrap:focus-within {
  border-color: rgba(196,98,45,0.4);
  box-shadow: 0 4px 24px rgba(196,98,45,0.1);
}

.input-field {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: 'Noto Sans', sans-serif;
  font-size: 15px;
  font-weight: 300;
  color: var(--ink);
  resize: none;
  max-height: 120px;
  line-height: 1.6;
  padding: 4px 0;
}

.input-field::placeholder { color: var(--ink3); }

.send-btn {
  background: var(--accent);
  border: none;
  border-radius: 10px;
  width: 40px;
  height: 40px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  align-self: flex-end;
  transition: opacity 0.2s, transform 0.15s;
}

.send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.send-btn svg { fill: white; }

/* End state */
.end-banner {
  text-align: center;
  padding: 24px;
  font-family: 'Noto Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--ink3);
  text-transform: uppercase;
  border-top: 1px solid var(--border2);
  margin-top: 16px;
}

.restart-btn {
  margin-top: 12px;
  display: inline-block;
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  cursor: pointer;
  background: none;
  font-family: 'Noto Sans', sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink2);
  transition: border-color 0.2s, color 0.2s;
}

.restart-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>

SEU OBJETIVO: sair com um mapa claro dos processos críticos de cada pessoa — com contexto suficiente para propor soluções reais.

COMO VOCÊ CONDUZ A ENTREVISTA:
- Tom: natural, humano, informal mas inteligente. Como uma colega curiosa e atenta, não um robô de formulário.
- Faça UMA pergunta por vez, curta e direta. Nunca duas perguntas na mesma mensagem.
- Respostas curtas e sequenciais são melhores do que textos longos. Prefira 2-3 frases por mensagem.
- Se a pessoa mencionar algo interessante de passagem, pegue o gancho.
- Explore cada processo em profundidade: frequência, pessoas envolvidas, ferramentas usadas (ou a falta delas), e o que acontece quando falha.
- Você pode e deve fazer quantas perguntas forem necessárias. Não existe número fixo.
- Explore múltiplos processos — não pare no primeiro.

QUANDO SENTIR QUE TEM MATERIAL SUFICIENTE:
1. Diga que já tem um bom panorama e pergunte: "Tem mais algum processo que você queira adicionar? Quanto mais você me contar, mais completo fica o diagnóstico — e mais precisas as melhorias que vamos conseguir propor."
2. Se a pessoa disser que sim → continue explorando o novo processo normalmente, e ao final mostre o diagnóstico parcial e pergunte novamente se quer adicionar mais.
3. Se a pessoa disser que não → agradeça e faça a pergunta de avaliação: "Antes de encerrar, como você avaliaria essa conversa? Pode dar uma nota de 0 a 10 ou me contar com suas palavras mesmo 😊"
4. Registre a avaliação com carinho e genuinidade, depois encerre com uma mensagem calorosa e finalize com a tag: [FIM_ENTREVISTA]

REGRAS IMPORTANTES:
- Escreva sempre em português brasileiro.
- Nunca explique que está seguindo um roteiro.
- Nunca use palavras como "coletar dados" ou "preencher formulário".
- Seja humana, curiosa, empática.

function setPhase(p) {
  phase = Math.min(p, 5);
  dotsEl.forEach((d, i) => {

function addMessage(role, text) {
  const wrap = document.createElement("div");
  wrap.className = `message ${role}`;

  const label = document.createElement("div");
  label.className = "msg-label";
  label.textContent = role === "agent" ? "Diana" : "Você";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (role === "agent") {
    // Parse basic markdown
    let html = text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.*?)\*/g, "<em>$1</em>")
      .replace(/\n/g, "<br>");
    bubble.innerHTML = html;
  } else {
    bubble.textContent = text;
  }

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

      if (tipo)       html += `<div style="font-size:12px;color:var(--ink3);margin-bottom:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;">TIPO &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span style="color:var(--ink2);">${tipo}</span></div>`;
      if (freq)       html += `<div style="font-size:12px;color:var(--ink3);margin-bottom:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;">FREQUÊNCIA &nbsp;<span style="color:var(--ink2);">${freq}</span></div>`;
      if (pessoas)    html += `<div style="font-size:12px;color:var(--ink3);margin-bottom:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;">PESSOAS &nbsp;&nbsp;&nbsp;&nbsp;<span style="color:var(--ink2);">${pessoas}</span></div>`;
      if (ferramentas)html += `<div style="font-size:12px;color:var(--ink3);margin-bottom:3px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;">FERRAMENTAS &nbsp;<span style="color:var(--ink2);">${ferramentas}</span></div>`;
      if (contexto)   html += `<div style="font-size:13px;color:var(--ink2);margin-top:8px;line-height:1.6;">${contexto}</div>`;

      proc.innerHTML = html;
      card.appendChild(proc);
    });
  }

  if (maiorDor) {
    const sec = document.createElement("div");
    sec.className = "section";
    sec.style.marginTop = "14px";
    sec.innerHTML = `<div class="section-label">Maior dor identificada</div><div class="section-value">${maiorDor}</div>`;
    card.appendChild(sec);
  }

  if (oportunidade) {
    const sec = document.createElement("div");
    sec.className = "section";
    sec.innerHTML = `<div class="section-label">Maior oportunidade de transformação</div><div class="section-value" style="color:var(--accent);font-weight:400;">${oportunidade}</div>`;
    card.appendChild(sec);
  }

  const msgs = chat.querySelectorAll(".message.agent");
  const last = msgs[msgs.length - 1];
  if (last) last.appendChild(card);
}

// ── AUTO-SAVE ─────────────────────────────────────────────────────
async function createOrUpdateEntrevista(final = false, resumoText = null) {
  try {
    const headers = {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Prefer": "return=representation"
    };

    // Extract partial info from conversation
    const firstUserMsg = messages.find(m => m.role === "user")?.content || "";
    const partialNome = firstUserMsg.split(",")[0]?.trim() || null;

    const payload = {
      transcricao: messages,
      status: final ? "concluida" : "em_andamento",
      nome: resumoText ? (resumoText.match(/^nome:\s*(.+)/m) || [])[1]?.trim() : partialNome,
      area: resumoText ? (resumoText.match(/^area:\s*(.+)/m) || [])[1]?.trim() : null,
      maior_dor: resumoText ? (resumoText.match(/^maior_dor:\s*(.+)/m) || [])[1]?.trim() : null,
      oportunidade: resumoText ? (resumoText.match(/^oportunidade_imediata:\s*(.+)/m) || [])[1]?.trim() : null,
      avaliacao_nota: resumoText ? (resumoText.match(/^avaliacao_nota:\s*(.+)/m) || [])[1]?.trim() : null,
      avaliacao_comentario: resumoText ? (resumoText.match(/^avaliacao_comentario:\s*(.+)/m) || [])[1]?.trim() : null,
    };

    if (!entrevistaId) {
      // CREATE
      const res = await fetch(SUPABASE_URL + "/rest/v1/diagnostico_entrevistas", {
        method: "POST", headers,
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      entrevistaId = data[0]?.id;
      console.log("Entrevista criada:", entrevistaId);
    } else {
      // UPDATE
      await fetch(`${SUPABASE_URL}/rest/v1/diagnostico_entrevistas?id=eq.${entrevistaId}`, {
        method: "PATCH", headers,
        body: JSON.stringify(payload)
      });
      console.log("Entrevista atualizada:", entrevistaId);
    }

    // If final, save processes too
    if (final && resumoText && entrevistaId) {
      // Delete old processes first (in case of update)
      await fetch(`${SUPABASE_URL}/rest/v1/diagnostico_processos?entrevista_id=eq.${entrevistaId}`, {
        method: "DELETE", headers: {...headers}
      });
      // Insert new ones
      const processBlocks = resumoText.split(/^\s*-\s*processo:/m).slice(1);
      for (const block of processBlocks) {
        const proc = {
          entrevista_id: entrevistaId,
          processo: block.split("\n")[0]?.trim() || null,
          tipo: (block.match(/tipo:\s*(.+)/) || [])[1]?.trim() || null,
          frequencia: (block.match(/frequencia:\s*(.+)/) || [])[1]?.trim() || null,
          pessoas_envolvidas: (block.match(/pessoas_envolvidas:\s*(.+)/) || [])[1]?.trim() || null,
          ferramentas: (block.match(/ferramentas:\s*(.+)/) || [])[1]?.trim() || null,
          impacto_se_falha: (block.match(/impacto_se_falha:\s*(.+)/) || [])[1]?.trim() || null,
          contexto: (block.match(/contexto:\s*(.+)/) || [])[1]?.trim() || null,
        };
        await fetch(SUPABASE_URL + "/rest/v1/diagnostico_processos", {
          method: "POST", headers, body: JSON.stringify(proc)
        });
      }
    }
  } catch(e) {
    console.error("Auto-save error:", e);
  }
}

function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => createOrUpdateEntrevista(false), 3000);
}

// Save on page close
window.addEventListener("beforeunload", () => {
  if (messages.length > 1 && !ended) {
    // Use sendBeacon for reliability on unload
    const payload = JSON.stringify({
      id: entrevistaId,
      transcricao: messages,
      status: "abandonada"
    });
    navigator.sendBeacon(
      SUPABASE_URL + (entrevistaId
        ? `/rest/v1/diagnostico_entrevistas?id=eq.${entrevistaId}`
        : "/rest/v1/diagnostico_entrevistas"),
      new Blob([payload], { type: "application/json" })
    );
  }
});

async function saveToSupabase(resumoText) {
  await createOrUpdateEntrevista(true, resumoText);
}

function endInterview(resumoText) {
  ended = true;
  inputArea.style.display = "none";
  setPhase(6);

  if (resumoText) saveToSupabase(resumoText);

  const banner = document.createElement("div");
  banner.className = "end-banner";
  banner.innerHTML = `Entrevista concluída · obrigado pela participação<br>
    <button class="restart-btn" onclick="location.reload()">Nova entrevista</button>`;
  chat.appendChild(banner);
  document.getElementById("chat-footer").style.display = "block";
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

async function callClaude(userMessage) {
  if (userMessage) {
    messages.push({ role: "user", content: userMessage });
  }

  isTyping = true;
  sendBtn.disabled = true;
  showTyping();

  try {
    // Retry automático para lidar com cold start da Edge Function (502)
    let res;
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        res = await fetch("https://ucavfotyciwnqwurzjny.supabase.co/functions/v1/anthropic-proxy", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: MODEL,
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: messages,
          }),
        });
        if (res.status !== 502) break;
        if (attempt < 3) await new Promise(r => setTimeout(r, 2000 * attempt));
      } catch(e) {
        if (attempt === 3) throw e;
        await new Promise(r => setTimeout(r, 2000 * attempt));
      }
    }

    const data = await res.json();
    removeTyping();

    const reply = data.content?.[0]?.text || "Desculpe, houve um erro.";

    // Strip summary block from display text
    let displayText = reply
      .replace(/\[RESUMO\][\s\S]*?\[\/RESUMO\]/g, "")
      .replace(/\[FIM_ENTREVISTA\]/g, "")
      .trim();

    messages.push({ role: "assistant", content: reply });

    addMessage("agent", displayText);

    // Update phase based on message count
    const agentCount = messages.filter(m => m.role === "assistant").length;
    if (agentCount === 1) setPhase(1);
    else if (agentCount === 2) setPhase(2);
    else if (agentCount === 3) setPhase(3);
    else if (agentCount === 4) setPhase(4);
    else if (agentCount >= 5) setPhase(5);

    // Extract and show summary
    const resumoMatch = reply.match(/\[RESUMO\]([\s\S]*?)\[\/RESUMO\]/);
    if (resumoMatch) {
      setTimeout(() => showSummary(resumoMatch[1]), 300);
    }

    // Check if interview ended — pass resumo so it gets saved
    if (reply.includes("[FIM_ENTREVISTA]")) {
      const resumoText = resumoMatch ? resumoMatch[1] : null;
      setTimeout(() => endInterview(resumoText), 800);
    }

  } catch (err) {
    removeTyping();
    addMessage("agent", "Ocorreu um erro de conexão. Por favor, recarregue a página e tente novamente.");
    console.error(err);
  }

  isTyping = false;
  if (!ended) sendBtn.disabled = false;
  input.focus();
}

// Auto-resize textarea
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 120) + "px";
  sendBtn.disabled = input.value.trim().length === 0;
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) submit();
  }
});

sendBtn.addEventListener("click", submit);

function submit() {
  const text = input.value.trim();
  if (!text || isTyping || ended) return;
  input.value = "";
  input.style.height = "auto";
  sendBtn.disabled = true;
  addMessage("user", text);
  scheduleAutoSave();
  callClaude(text);
}

// Kick off
setPhase(0);
// Send all 3 greeting messages at once, then start the conversation
async function startConversation() {
  sendBtn.disabled = true;

  const greetings = [
    "Olá, tudo bem? 😊 Obrigada pelo seu tempo — é muito importante pra gente.",
    "Eu sou a Diana, uma IA criada sob medida aqui na Carpediem Homes, já como parte do nosso processo de maturidade em IA. Minha função é entender como as coisas funcionam na prática — os processos que consomem tempo, que são repetitivos ou que poderiam ser feitos de forma mais inteligente.",
    "O que você vai compartilhar aqui vai direto alimentar as próximas melhorias da empresa. Não precisa escolher palavras — pode escrever do jeito que preferir. Vamos demorar entre 5 e 10 minutos. Pode começar me dizendo seu nome e em qual área você atua? 🙂"
  ];

  for (let i = 0; i < greetings.length; i++) {
    await new Promise(r => setTimeout(r, i === 0 ? 300 : 900));
    addMessage("agent", greetings[i]);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  // Push greeting into message history so the AI has context
  messages.push({ role: "assistant", content: greetings.join("\n\n") });
  setPhase(1);
  sendBtn.disabled = false;
  input.focus();
}

startConversation();
</script>
